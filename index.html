    <script>
      // Omezeni priblizeni (desktop zoom interceptor)
      document.addEventListener("wheel", function (e) {
        if (e.ctrlKey) {
          // Zabranime priblizeni/oddaleni pomoci kolecka mysi a Ctrl
          e.preventDefault();
        }
      }, { passive: false });
      
      document.addEventListener("keydown", function (e) {
        // Zabranime klavesovym zkratkam Ctrl + +, Ctrl + -, Ctrl + 0
        if (e.ctrlKey && (e.key === "=" || e.key === "-" || e.key === "0" || e.key === "+")) {
          e.preventDefault();
        }
      });
    </script>
